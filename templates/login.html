{% extends "base.html" %}

{% block styles %}<link rel="stylesheet" href="/static/css/auth.css">{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔑</div>
            <div class="auth-title">Bienvenido de nuevo</div>
            <div class="auth-subtitle">Ingresa tus credenciales para continuar</div>
        </div>

        <hr class="auth-divider">

        {% if msg %}
        <div class="auth-msg">❌ {{ msg }}</div>
        {% endif %}

        <form action="/login" method="post" style="margin:0; background:none; box-shadow:none; border:none; padding:0; max-width:none;">

            <div class="auth-field">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Tu nombre de usuario" required autofocus>
            </div>

            <div class="auth-field">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Tu contraseña" required>
            </div>

            <button type="submit" class="auth-submit-btn">🔑 Iniciar sesión</button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="/register">Regístrate gratis</a>
        </div>
    </div>
</div>
{% endblock %}
