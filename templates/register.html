{% extends "base.html" %}

{% block styles %}<link rel="stylesheet" href="/static/css/auth.css">{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">✨</div>
            <div class="auth-title">Crear cuenta</div>
            <div class="auth-subtitle">Únete a UPSKILLS y empieza a vender</div>
        </div>

        <hr class="auth-divider">

        {% if msg %}
        <div class="auth-msg">❌ {{ msg }}</div>
        {% endif %}

        <form action="/register" method="post" style="margin:0; background:none; box-shadow:none; border:none; padding:0; max-width:none;">

            <div class="auth-row">
                <div class="auth-field">
                    <label>Usuario</label>
                    <input type="text" name="username" placeholder="Tu nombre de usuario" required>
                </div>
                <div class="auth-field">
                    <label>WhatsApp</label>
                    <input type="text" name="whatsapp" placeholder="+57 300 000 0000" required>
                </div>
            </div>

            <div class="auth-field">
                <label>Correo electrónico</label>
                <input type="email" name="email" placeholder="correo@ejemplo.com" required>
            </div>

            <div class="auth-field">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="auth-submit-btn">✨ Crear mi cuenta</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a>
        </div>
    </div>
</div>
{% endblock %}
